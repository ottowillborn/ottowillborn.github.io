baseURL = 'https://ottowillborn.github.io'
languageCode = 'en-us'
title = 'Otto Willborn'
theme = "minimal-black"

# Enable search index generation and web app manifest
[outputs]
  home = ["HTML", "RSS", "JSON", "WebAppManifest"]

[outputFormats.WebAppManifest]
  mediaType = "application/manifest+json"
  rel = "manifest"
  baseName = "manifest"
  isPlainText = true
  notAlternative = true

[params]
  brand = "ottowillborn"
  description = "Software Engineering student at the University of Victoria with a focus on Embedded Systems, Software Architechture, and Full-Stack Development." #

  # Favicon - Place your favicon files in /static/ directory
  favicon = "icons/favicon.svg"
  appleTouchIcon = "apple-touch-icon.png"

  # Logo (optional)
  logo = "/images/profilepicture.jpg"

  # Project and blog intro text
  projectsIntro = "Selected technical projects." #
  blogIntro = "" 

  # Web App Manifest Configuration (PWA support)
  [params.manifest]
    themeColor = "#a855f7"
    backgroundColor = "#000000"
    categories = ["portfolio", "developer"]

  # Theme Configuration
  [params.theme]
    defaultTheme = "dark"

  # Home Page Configuration
  [params.home]
    sections = ["hero", "now", "tech-marquee", "projects", "posts"]
    showNowSection = true
    showFeaturedProjects = true
    showLatestPosts = true
    featuredProjectsLimit = 3
    latestPostsLimit = 3
    projectsTitle = "Selected Work"
    projectsSubtitle = ""
    blogTitle = "Latest Writing"
    blogSubtitle = ""
    techMarqueeLabel = "Tech Stack"

    # Technology Stack Display
    [[params.home.tech]]
      label = "Python"
      icon = "devicon-python-plain" #

    [[params.home.tech]]
      label = "Java"
      icon = "devicon-java-plain" #

    [[params.home.tech]]
      label = "React"
      icon = "devicon-react-plain" #

    [[params.home.tech]]
      label = "Rust"
      icon = "devicon-rust-plain" #

    [[params.home.tech]]
      label = "Docker"
      icon = "devicon-docker-plain" #

    [[params.home.tech]]
      label = "Linux"
      icon = "devicon-linux-plain" #

    [[params.home.techReverse]]
      label = "SQL"
      icon = "devicon-postgresql-plain" #

    [[params.home.techReverse]]
      label = "Git"
      icon = "devicon-git-plain" #

    [[params.home.techReverse]]
      label = "Azure"
      icon = "devicon-azure-plain" #

  # About Page Alternative Layout Configuration
  [params.about.alt]
    [[params.about.alt.stats]]
      value = "6"
      label = "Years Coding" #

    [[params.about.alt.stats]]
      value = "3"
      label = "Key Projects" #

    [[params.about.alt.skills]]
      label = "Python"
      icon = "devicon-python-plain" #

    [[params.about.alt.skills]]
      label = "Java"
      icon = "devicon-java-plain" #

    [[params.about.alt.skills]]
      label = "React"
      icon = "devicon-react-original" #

    [[params.about.alt.skills]]
      label = "Docker"
      icon = "devicon-docker-plain" #

  # Hero Section Configuration
  [params.hero]
    badge = "Software Engineering Student" #
    title = "Hi, I'm Otto!" #
    role = "Software Engineer" #
    summary = "Student at the University of Victoria with a focus on Embedded Systems, Software Architechture, and Full-Stack Development. Graduating April 2027!"
    location = "Victoria, Canada" #
    focus = "Currently focused on completing final term and securing co-op work" #
    available = true
    availableLabel = "Open to Opportunities"

    nowLabel = "Quick Facts"
    nowIntro = "Right now I'm mainly:"
    now = [
      "Optimizing Surf Cam video streaming for web browser", #
      "Working on final capstone project with my team", #
      "Waiting for a solid swell to come..." #
    ]

    [params.hero.primary]
      label = "View Projects"
      href = "/projects/"

    [params.hero.secondary]
      label = "Contact Me"
      href = "mailto:ottowillborn@gmail.com" #

  # Icon Libraries
  [params.icons]
    useFontAwesome = true
    useDevicon = true

  # Social Links
  [[params.social]]
    label = "GitHub"
    url = "https://github.com/ottowillborn" #
    icon = "fa-brands fa-github"

  [[params.social]]
    label = "LinkedIn"
    url = "https://www.linkedin.com/in/otto-willborn" #
    icon = "fa-brands fa-linkedin-in"

  [[params.social]]
    label = "Email"
    url = "mailto:ottowillborn@gmail.com" #
    icon = "fa-regular fa-envelope"

# Navigation Menu
[menu]
  [[menu.main]]
    name = "Home"
    pageRef = "/"
    url = "/"
    weight = 1
    identifier = "home"
    [menu.main.params]
      icon = "fa-solid fa-house"

  [[menu.main]]
    name = "About"
    pageRef = "about"
    url = "/about/"
    weight = 2
    identifier = "about"
    [menu.main.params]
      icon = "fa-regular fa-user"

  [[menu.main]]
    name = "Projects"
    pageRef = "projects"
    url = "/projects/"
    weight = 3
    identifier = "projects"
    [menu.main.params]
      icon = "fa-regular fa-folder-open"

# Markup Configuration
[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

  [markup.goldmark.renderer]
    unsafe = true

  [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true

  [markup.goldmark.extensions]
    typographer = true
    linkify = true
    table = true
    strikethrough = true
    taskList = true
    definitionList = true
    footnote = true

  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
    tabWidth = 2